name: AI News Alert

on:
  schedule:
    # We ask for every 15 min, but GitHub heavily throttles free scheduled cron
    # (often 2-3h between actual runs). That's fine: LOOKBACK_MINUTES (6h) means
    # each run still catches everything published since the last one, and the
    # tracker dedups so nothing is ever sent twice.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

# Run all JavaScript actions on Node.js 24 (silences the Node 20 deprecation).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Never run two polls at once (avoids duplicate sends / state races)
concurrency:
  group: news-alert
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restores the latest saved "seen" list at start, and saves the updated
      # one automatically at the end of the job (post-step).
      # First-ever run finds nothing -> bot seeds silently, sends nothing.
      - name: Persist bot state (seen articles + Twilio daily budget)
        uses: actions/cache@v4
        with:
          path: |
            seen_articles.json
            bot_state.json
          key: bot-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            bot-state-
            seen-articles-

      - name: Run one poll cycle
        env:
          RUN_ONCE: "1"
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TO: ${{ secrets.TWILIO_WHATSAPP_TO }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          # Auto-provided by Actions — lifts the GitHub API limit (60 -> 5000/hr)
          # used by live tool discovery. No secret to configure.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POLL_INTERVAL_MINUTES: "15"
          # Look back 6h so throttled/delayed runs never miss fresh news.
          LOOKBACK_MINUTES: "360"
          # Twilio free-tier guardrails.
          MAX_SENDS_PER_DAY: "16"
          MAX_NEWS_PER_RUN: "6"
          FALLBACK_GAP_HOURS: "2"
        run: python main.py
